<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchandise Items</title>
</head>
<body>
    <main>
        <h1>Merchandise Items</h1>

        {% if items %}
            <ul>
                {% for item in items %}
                    <li>
                        <article>
                            <h2><a href="{% url 'merchstore:item_detail' item.id %}">{{ item.name }}</a></h2>
                            <p><strong>Type:</strong> {{ item.product_type.name|default:"Uncategorized" }}</p>
                            <p><strong>Price:</strong> {{ item.price|floatformat:2 }}</p>
                            <p>{{ item.description }}</p>
                        </article>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No merchandise items are available.</p>
        {% endif %}
    </main>
</body>
</html>
