{% extends 'merchstore_base.html' %}

{% block title %}Product Form{% endblock %}

{% block content %}
    <h1>Product Form</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>
    <p><a href="{% url 'merchstore:item_list' %}">Back to items list</a></p>
{% endblock %}
